# Standalone tool config — only used by robonix/roboarm/tools/*
# Does not affect rbnx boot / primitives / skills.
#
# 抓取/放置/YOLO 等参数从 skill 配置合并；本文件仅保留 tools 专用项，
# 同名字段会覆盖 skill（请勿在此重复写 catch_raise_height 等，改 skill 配置即可）。

grasp_config: ../skills/roboarm_grasp/config/config.yaml

# 机械臂串口
arm_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5AAF288343-if00
arm_backend: real
# 标定后的关节 offset（与 robonix_manifest.yaml arm_offset 一致）
arm_offset:
  - 0.66
  - -20.84
  - -30.42
  - -79.96
  - 0.40

# 相机：留空 camera_ip 为 USB Orbbec
camera_ip:
camera_port: 8083
# WSL 无 GUI 时可设端口，浏览器看画面（如 8765）
cv2_headless_port:

# 离线调试运动插值步数（对应 manifest 里 motion_steps）
motion_steps: 20

# 串口不稳定时：每次通信额外重试次数（总尝试 = 1 + N）
arm_comm_retry: 10
# 每次重试间隔（秒）
arm_comm_retry_delay_s: 0.05
