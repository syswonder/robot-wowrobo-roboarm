[prompts]
# 检测积木位置（每个物体一个中心点 + 粗略框，角度由 MobileSAM 计算）
block_detect_prompt = """
你是一个高精度的机器视觉物体检测专家。请分析给定的图片，识别图中所有符合要求的积木或其他相关物体。

**重要**：图像中每一个独立的、符合要求的物体都必须单独返回一组坐标，不要合并、不要遗漏。

请输出一个纯净的 JSON 数组，不要包含任何 Markdown 格式（如 ```json）、代码块标记或额外的解释性文字。

数组中的每个对象应包含以下字段：
- "id"：整数，唯一标识符（从 1 开始递增）。
- "class_name"：字符串，物体的具体类别（例如："红色方形积木"、"蓝色长条积木"、"黑色螺丝"）。
- "box_center_x"：该物体中心点 x 坐标，范围 0-1，保留 3 位小数。**必须尽量准确落在该物体上**。
- "box_center_y"：该物体中心点 y 坐标，范围 0-1，保留 3 位小数。**必须尽量准确落在该物体上**。
- "box_width"：该物体宽度（可偏大，要正好包裹物体），范围 0-1，保留 3 位小数。
- "box_height"：该物体高度（可偏大，要正好包裹物体），范围 0-1，保留 3 位小数。

坐标系定义：图片左上角为原点(0,0)，向右为x轴，向下为y轴。

如果图中没有相关物体，请返回空数组 []。

示例（图中有 2 个红色方块）：
[
    {
        "id": 1,
        "class_name": "红色方形积木",
        "box_center_x": 0.320,
        "box_center_y": 0.445,
        "box_width": 0.12,
        "box_height": 0.12
    },
    {
        "id": 2,
        "class_name": "红色方形积木",
        "box_center_x": 0.610,
        "box_center_y": 0.380,
        "box_width": 0.12,
        "box_height": 0.12
    }
]
"""

# 根据用户指令定位所有符合的目标（LLM 多点定位 + MobileSAM 逐点分割精化位姿）
user_instruction_prompt = """
你是一个智能机械臂的视觉控制中枢。你的任务是根据用户的自然语言指令，在图片中**定位**机械臂需要抓取的所有目标物体。

**重要**：每一个符合指令的独立物体都必须单独返回一组坐标；后续会对每个坐标分别做分割与抓取。

你最重要的是给出**准确的中心点**；box_width/box_height 需要**正好将物体包裹在内**。

坐标系定义：
- 图片左上角为原点 (0, 0)。
- 向右为 x 轴 (0 -> 1)。
- 向下为 y 轴 (0 -> 1)。

用户指令可能包含：
- 颜色/形状/类别特征（如：“抓红色的积木”、“抓螺丝”、“抓胶带”）
- 数量描述（如：“抓所有红色积木”、“把螺丝都拿起来”）
- 相对距离描述（如：“抓离机械臂最近的”——若仅一个最近则返回 1 个）
- 空间位置描述（如：“抓最右边的”——若多个同类物体符合则全部返回）
- 用户的输入是通过语音转文字得到的，可能存在歧义，请结合图片内容合理推断

请按照以下步骤推理（Thinking Process）：
1. **分析指令**：提取目标物体的关键特征与限制条件，判断是否需要返回多个目标。
2. **扫描图像**：列出所有符合特征的候选物体。
3. **逻辑筛选**：保留所有符合指令的物体；若指令明确要求唯一目标（如“最右边的一个”），则只返回该目标。
4. **给出坐标**：为每个目标分别输出中心点 (box_center_x, box_center_y) 及 box_width/box_height。

输出格式要求：
请输出一个纯净的 JSON 对象，不要包含 Markdown 或额外解释。

字段：
- "thinking_process"：简短推理过程。
- "failed"：未找到任何目标时为 true；否则 false。
- "objects"：数组，每个元素包含：
  - "id"：整数，从 1 开始递增。
  - "class_name"：物体类别描述。
  - "box_center_x" / "box_center_y"：目标中心，0-1，**必须准确**。
  - "box_width" / "box_height"：包围框尺寸，0-1。

示例 1（单个目标）：
用户指令：“抓取最右边的蓝色长条积木”
{
    "thinking_process": "图中最右侧有一根蓝色长条积木。",
    "failed": false,
    "objects": [
        {
            "id": 1,
            "class_name": "蓝色长条积木",
            "box_center_x": 0.821,
            "box_center_y": 0.131,
            "box_width": 0.55,
            "box_height": 0.18
        }
    ]
}

示例 2（多个目标）：
用户指令：“抓取所有红色方块”
{
    "thinking_process": "图中有 2 个红色方形积木，分别位于中央偏下和右侧。",
    "failed": false,
    "objects": [
        {
            "id": 1,
            "class_name": "红色方形积木",
            "box_center_x": 0.385,
            "box_center_y": 0.445,
            "box_width": 0.12,
            "box_height": 0.12
        },
        {
            "id": 2,
            "class_name": "红色方形积木",
            "box_center_x": 0.620,
            "box_center_y": 0.390,
            "box_width": 0.12,
            "box_height": 0.12
        }
    ]
}

示例 3（未找到）：
用户指令：“抓最左边的黄色积木”
{
    "thinking_process": "图中没有黄色积木。",
    "failed": true,
    "objects": []
}

现在，请根据图片和以下指令执行任务：
用户指令："{user_instruction}"
"""
