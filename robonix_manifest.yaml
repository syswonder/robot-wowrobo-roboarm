catalog:
  name: robonix.robot.wowrobo.roboarm
  version: 0.1.0
  description: Roboarm LeRobot Koch 五自由度机械臂 Robonix 部署。
  tags:
    - robot
    - deploy
    - robonix
    - manipulator
    - lerobo
  maintainers:
    - Yuzheng Gao <2300013159@stuu.pku.edu.cn>
  license: Apache-2.0

name: roboarm

env:
  LOG: "INFO"
  ROBONIX_ADVERTISE_HOST: "127.0.0.1"

system:
  atlas:
    listen: 127.0.0.1:50051
    log: info
  executor:
    listen: 127.0.0.1:50061
    log: info
  soma:
    robot_yaml: ./soma.yaml
  pilot:
    listen: 127.0.0.1:50071
    log: info
    vlm:
      upstream: ${VLM_BASE_URL}
      api_key: ${VLM_API_KEY}
      model: ${VLM_MODEL}
      api_format: openai
  liaison:
    listen: 0.0.0.0:50081
    log: info
  memory: []



primitive:
  - name: roboarm_arm
    path: primitives/roboarm_arm
    config:
      #机械臂串口
      serial_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5AAF288343-if00
      #机械臂模式，real为真机，sim为模拟
      arm_backend: real
      arm_offset:
        - -2.51
        - -20.88
        - -22.77
        - -79.47
        - -1.80
      joint_names:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - gripper
      joint_states_topic: /roboarm/joint_states
      end_pose_topic: /roboarm/end_pose
      joint_command_topic: /roboarm/joint_command
      gripper_open_width_m: 0.080
      move_to_home_on_activate: true
      #如果设备连不上还想启动robonix，改为true
      allow_missing_hardware: false

  - name: orbbec_camera_roboarm
    path: primitives/orbbec_camera_roboarm
    config:
      #相机ip，留空为USB相机，填IP为远程MJPEG
      camera_ip: ""
      camera_port: 8083
      enable_color: true
      enable_depth: true
      publish_rate_hz: 15
      intrinsics_rate_hz: 1.0
      rgb_topic: /roboarm/camera/rgb
      depth_topic: /roboarm/camera/depth
      intrinsics_topic: /roboarm/camera/camera_info
      extrinsics_topic: /roboarm/camera/extrinsics
      optical_frame: camera_color_optical_frame
      base_frame: base_link
      frame_timeout_ms: 100
      #如果设备连不上还想启动robonix，改为true
      allow_missing_hardware: false
    
#   - name: audio_driver
#     url: https://github.com/syswonder/primitive-audio-driver-rbnx
#     branch: main
#     config:
#       mic_device: default
#       speaker_device: default

# service: 
#   - name: speech
#     path: ${ROBONIX_SOURCE_PATH}/services/speech
#     config:
#       speech_backend: tencent
#       default_speaker_provider_id: audio_driver
#       tencent_asr_appid: ${TENCENT_ASR_APPID}
#       tencent_asr_engine: 16k_zh

skill:
  - name: roboarm_grasp
    path: skills/roboarm_grasp
    config:
      arm_provider_id: roboarm_arm
      camera_provider_id: orbbec_camera_roboarm
      arm_offset:
        - -2.51
        - -20.88
        - -22.77
        - -79.47
        - -1.80
      joint_names:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - gripper
      gripper_open_width_m: 0.080
      motion_steps: 20
